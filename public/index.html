<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Lucky Draw</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="page">
    <div class="bg-pattern"></div>

    <header class="header">
      <div class="brand-tag">🎁 Lucky Draw</div>
      <h1 class="title">Lucky Draw</h1>
      <p class="subtitle">Spins left: <span id="remaining">-</span></p>
    </header>

    <div class="wheel-area">
      <div class="coins">
        <div class="coin coin-1">💰</div>
        <div class="coin coin-2">💰</div>
        <div class="coin coin-3">💰</div>
        <div class="coin coin-4">💰</div>
      </div>

      <div class="wheel-container">
        <div class="wheel-outer">
          <div class="wheel-lights" id="wheelLights"></div>
          <div class="wheel-inner-border">
            <div class="wheel" id="wheel"></div>
          </div>
        </div>
        <div class="wheel-pointer"></div>
        <button type="button" class="spin-btn" id="spinBtn">Spin</button>
      </div>
    </div>

    <div class="cta-banner">More perks, more prizes!</div>

    <footer class="footer">
      <span>🎁 Lucky Draw Event</span>
    </footer>
  </div>

  <div class="modal" id="resultModal">
    <div class="modal-content">
      <div class="modal-icon">🎉</div>
      <p id="resultText"></p>
      <button type="button" class="modal-btn" id="closeModal">Awesome!</button>
    </div>
  </div>

  <script src="/js/fingerprint.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
